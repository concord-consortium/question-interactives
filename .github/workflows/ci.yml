name: Continuous Integration

on: push

jobs:
  build_test:
    name: Build and Run Jest Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install Dependencies
        run: npm ci
      - name: Build
        # Cap Nx build parallelism (default is os.cpus().length = 4 on the runner).
        # Running 4 production webpack builds at once caused runner "shutdown signal"
        # flakes under memory pressure; limit to 3 concurrent builds.
        run: npm run build -- --concurrency 3
      - name: Run Tests
        run: npm run test
  cypress:
    runs-on: ubuntu-latest
    strategy:
      # when one test fails, DO NOT cancel the other
      # containers, because this will kill Cypress processes
      # leaving the Dashboard hanging ...
      # https://github.com/cypress-io/github-action/issues/48
      fail-fast: false
      matrix:
        # TEMPORARY [QI-160] — REVERT BEFORE MERGE. Restore to [1, 2, 3].
        # The Blockly delete-announcement test fails only in CI and never locally, so CI is the
        # only reproducer we have and every diagnosis costs a full run. One container running one
        # spec turns a 20-minute cycle into a few minutes.
        containers: [1]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install Dependencies
        run: npm ci
      - name: Build
        # See build_test note: cap Nx build parallelism to avoid runner
        # "shutdown signal" flakes from concurrent webpack builds.
        run: npm run build -- --concurrency 3
      - name: Start server in the background
        run: npm start &
      - uses: cypress-io/github-action@v4
        with:
          # we have already installed all dependencies above
          install: false
          working-directory: ./packages/tests-e2e
          # TEMPORARY [QI-160] — REVERT BEFORE MERGE. Restore record/parallel to the
          # `${{ !!secrets.CYPRESS_RECORD_KEY }}` expressions and drop `spec`.
          # Only the blockly spec is under investigation; parallelism across one container is
          # pointless, and recording a partial run would pollute the Cypress dashboard.
          spec: e2e/blockly.test.js
          record: false
          parallel: false
        env:
          # pass the Dashboard record key as an environment variable
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          # pass GitHub token to allow accurately detecting a build vs a re-run build
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # turn on code coverage when running npm start
          # so far we've been using a webpack istanbul-instrumenter-loader for this
          # but there has been work on building code coverage into node itself, which
          # should be much faster
          CODE_COVERAGE: true
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v1
        with:
          flags: cypress
  s3-deploy:
    name: Deploy to Amazon S3
    needs:
      - build_test
      - cypress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install Dependencies
        run: npm ci
        env:
          # Skip installing Cypress since it isn't needed for just building
          # This decreases the deploy time quite a bit
          CYPRESS_INSTALL_BINARY: 0
      - name: Deploy files to Amazon S3
        uses: concord-consortium/s3-deploy-action@v1
        with:
          # See build_test note: cap Nx build parallelism to avoid runner
          # "shutdown signal" flakes from concurrent webpack builds. The action's
          # default build is 'npm run build'; override it to add the concurrency cap.
          build: npm run build -- --concurrency 3
          bucket: models-resources
          prefix: ${{ github.event.repository.name }} # 'question-interactives'
          awsAccessKeyId: ${{ secrets.AWS_ACCESS_KEY_ID }}
          awsSecretAccessKey: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          deployRunUrl: https://models-resources.concord.org/question-interactives/__deployPath__/
          # Add the default branch as a top branch
          topBranches: |-
            [
              "${{ github.event.repository.default_branch }}"
            ]
